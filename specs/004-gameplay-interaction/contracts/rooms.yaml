openapi: 3.1.0
info:
  title: Scribble Rooms API - Phase 3
  version: 1.0.0
paths:
  /rooms:
    post:
      summary: Create a room and join it as host
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - playerName
              properties:
                playerName:
                  type: string
                  description: Trimmed non-empty player name
      responses:
        "201":
          description: Room created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /rooms/{code}/join:
    post:
      summary: Join an existing lobby
      parameters:
        - $ref: "#/components/parameters/RoomCode"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - playerName
              properties:
                playerName:
                  type: string
                  description: Trimmed non-empty player name
      responses:
        "200":
          description: Joined room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/RoomNotFound"
        "409":
          description: Room already started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /rooms/{code}:
    get:
      summary: Fetch current viewer-specific room snapshot
      parameters:
        - $ref: "#/components/parameters/RoomCode"
        - name: participantId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Room snapshot for the requesting viewer
          content:
            application/json:
              schema:
                type: object
                required:
                  - room
                properties:
                  room:
                    oneOf:
                      - $ref: "#/components/schemas/LobbyRoomSnapshot"
                      - $ref: "#/components/schemas/DrawerActiveRoomSnapshot"
                      - $ref: "#/components/schemas/GuesserActiveRoomSnapshot"
        "404":
          $ref: "#/components/responses/RoomNotFound"
  /rooms/{code}/start:
    post:
      summary: Start a lobby as the host and create the active round
      parameters:
        - $ref: "#/components/parameters/RoomCode"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - participantId
              properties:
                participantId:
                  type: string
      responses:
        "200":
          description: Room started
          content:
            application/json:
              schema:
                type: object
                required:
                  - room
                properties:
                  room:
                    $ref: "#/components/schemas/DrawerActiveRoomSnapshot"
        "403":
          description: Only the host can start
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/RoomNotFound"
        "409":
          description: Room already started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Fewer than two players
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /rooms/{code}/guesses:
    post:
      summary: Submit a guess for the active round
      parameters:
        - $ref: "#/components/parameters/RoomCode"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - participantId
                - guessText
              properties:
                participantId:
                  type: string
                guessText:
                  type: string
                  description: Trimmed non-empty guess text
      responses:
        "200":
          description: Guess accepted and room state updated
          content:
            application/json:
              schema:
                type: object
                required:
                  - room
                properties:
                  room:
                    oneOf:
                      - $ref: "#/components/schemas/DrawerActiveRoomSnapshot"
                      - $ref: "#/components/schemas/GuesserActiveRoomSnapshot"
        "403":
          description: Viewer is not allowed to guess
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/RoomNotFound"
        "409":
          description: Room is not accepting guesses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Invalid guess text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  parameters:
    RoomCode:
      name: code
      in: path
      required: true
      schema:
        type: string
        pattern: "^[ABCDEFGHJKLMNPQRSTUVWXYZ23456789]{4}$"
  responses:
    BadRequest:
      description: Invalid request payload or validation failure
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RoomNotFound:
      description: Room not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    Participant:
      type: object
      required:
        - id
        - name
        - joinedAt
        - role
      properties:
        id:
          type: string
        name:
          type: string
        joinedAt:
          type: string
          format: date-time
        role:
          type: string
          enum: [host, player]
    GuessEntry:
      type: object
      required:
        - id
        - participantId
        - text
        - submittedAt
        - isCorrect
      properties:
        id:
          type: string
        participantId:
          type: string
        text:
          type: string
        submittedAt:
          type: string
          format: date-time
        isCorrect:
          type: boolean
    ScoreEntry:
      type: object
      required:
        - participantId
        - score
      properties:
        participantId:
          type: string
        score:
          type: integer
          minimum: 0
    BaseRoomSnapshot:
      type: object
      required:
        - code
        - status
        - hostId
        - participants
      properties:
        code:
          type: string
        status:
          type: string
          enum: [lobby, playing, result]
        hostId:
          type: string
        participants:
          type: array
          items:
            $ref: "#/components/schemas/Participant"
    LobbyRoomSnapshot:
      allOf:
        - $ref: "#/components/schemas/BaseRoomSnapshot"
        - type: object
          properties:
            drawerId:
              not: {}
            viewerRole:
              not: {}
            secretWord:
              not: {}
            guessHistory:
              not: {}
            scores:
              not: {}
            winnerId:
              not: {}
    ActiveRoomSnapshotShared:
      allOf:
        - $ref: "#/components/schemas/BaseRoomSnapshot"
        - type: object
          required:
            - drawerId
            - viewerRole
            - guessHistory
            - scores
          properties:
            status:
              type: string
              enum: [playing, result]
            drawerId:
              type: string
            viewerRole:
              type: string
              enum: [drawer, guesser]
            guessHistory:
              type: array
              items:
                $ref: "#/components/schemas/GuessEntry"
            scores:
              type: array
              items:
                $ref: "#/components/schemas/ScoreEntry"
            winnerId:
              type: string
    DrawerActiveRoomSnapshot:
      allOf:
        - $ref: "#/components/schemas/ActiveRoomSnapshotShared"
        - type: object
          required:
            - secretWord
          properties:
            viewerRole:
              type: string
              enum: [drawer]
            secretWord:
              type: string
    GuesserActiveRoomSnapshot:
      allOf:
        - $ref: "#/components/schemas/ActiveRoomSnapshotShared"
        - type: object
          properties:
            viewerRole:
              type: string
              enum: [guesser]
            secretWord:
              not: {}
    RoomSessionResponse:
      type: object
      required:
        - participantId
        - room
      properties:
        participantId:
          type: string
        room:
          oneOf:
            - $ref: "#/components/schemas/LobbyRoomSnapshot"
            - $ref: "#/components/schemas/DrawerActiveRoomSnapshot"
            - $ref: "#/components/schemas/GuesserActiveRoomSnapshot"
