openapi: 3.1.0
info:
  title: Scribble Rooms API - Phase 2
  version: 1.0.0
paths:
  /rooms:
    post:
      summary: Create a room and join it as host
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - playerName
              properties:
                playerName:
                  type: string
                  description: Trimmed non-empty player name
      responses:
        "201":
          description: Room created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /rooms/{code}/join:
    post:
      summary: Join an existing lobby
      parameters:
        - $ref: "#/components/parameters/RoomCode"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - playerName
              properties:
                playerName:
                  type: string
                  description: Trimmed non-empty player name
      responses:
        "200":
          description: Joined room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomSessionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/RoomNotFound"
        "409":
          description: Room already started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /rooms/{code}:
    get:
      summary: Fetch current viewer-specific room snapshot
      parameters:
        - $ref: "#/components/parameters/RoomCode"
        - name: participantId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Room snapshot for the requesting viewer
          content:
            application/json:
              schema:
                type: object
                required:
                  - room
                properties:
                  room:
                    oneOf:
                      - $ref: "#/components/schemas/LobbyRoomSnapshot"
                      - $ref: "#/components/schemas/DrawerRoomSnapshot"
                      - $ref: "#/components/schemas/GuesserRoomSnapshot"
        "404":
          $ref: "#/components/responses/RoomNotFound"
  /rooms/{code}/start:
    post:
      summary: Start a lobby as the host and create the first round
      parameters:
        - $ref: "#/components/parameters/RoomCode"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - participantId
              properties:
                participantId:
                  type: string
      responses:
        "200":
          description: Room started and first round assigned
          content:
            application/json:
              schema:
                type: object
                required:
                  - room
                properties:
                  room:
                    $ref: "#/components/schemas/DrawerRoomSnapshot"
        "403":
          description: Only the host can start
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/RoomNotFound"
        "409":
          description: Room already started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Fewer than two players
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  parameters:
    RoomCode:
      name: code
      in: path
      required: true
      schema:
        type: string
        pattern: "^[ABCDEFGHJKLMNPQRSTUVWXYZ23456789]{4}$"
  responses:
    BadRequest:
      description: Invalid request payload or validation failure
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RoomNotFound:
      description: Room not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    Participant:
      type: object
      required:
        - id
        - name
        - joinedAt
        - role
      properties:
        id:
          type: string
        name:
          type: string
        joinedAt:
          type: string
          format: date-time
        role:
          type: string
          enum: [host, player]
    BaseRoomSnapshot:
      type: object
      required:
        - code
        - status
        - hostId
        - participants
      properties:
        code:
          type: string
        status:
          type: string
          enum: [lobby, playing]
        hostId:
          type: string
        participants:
          type: array
          items:
            $ref: "#/components/schemas/Participant"
    LobbyRoomSnapshot:
      allOf:
        - $ref: "#/components/schemas/BaseRoomSnapshot"
        - type: object
          properties:
            drawerId:
              not: {}
            viewerRole:
              not: {}
            secretWord:
              not: {}
    PlayingRoomSnapshotShared:
      allOf:
        - $ref: "#/components/schemas/BaseRoomSnapshot"
        - type: object
          required:
            - drawerId
            - viewerRole
          properties:
            status:
              type: string
              enum: [playing]
            drawerId:
              type: string
            viewerRole:
              type: string
              enum: [drawer, guesser]
    DrawerRoomSnapshot:
      allOf:
        - $ref: "#/components/schemas/PlayingRoomSnapshotShared"
        - type: object
          required:
            - secretWord
          properties:
            viewerRole:
              type: string
              enum: [drawer]
            secretWord:
              type: string
              description: Deterministic active round word, visible only to drawer
    GuesserRoomSnapshot:
      allOf:
        - $ref: "#/components/schemas/PlayingRoomSnapshotShared"
        - type: object
          properties:
            viewerRole:
              type: string
              enum: [guesser]
            secretWord:
              not: {}
    RoomSessionResponse:
      type: object
      required:
        - participantId
        - room
      properties:
        participantId:
          type: string
        room:
          oneOf:
            - $ref: "#/components/schemas/LobbyRoomSnapshot"
            - $ref: "#/components/schemas/DrawerRoomSnapshot"
            - $ref: "#/components/schemas/GuesserRoomSnapshot"
